<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مندي أبو الزوز</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #002d50;
    --primary: #d21618;
    --gold: #f5c842;
    --text: #ffffff;
    --card-bg: #003a68;
    --border: rgba(255,255,255,0.08);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(0,20,38,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--primary);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(210,22,24,0.5));
  }
  .header-text h1 {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1.2;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }
  .header-text p {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
  }
  .header-phone {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .header-phone a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .header-phone a::before { content: "📞"; font-size: 0.75rem; }

  /* HERO */
  .hero {
    position: relative;
    background: linear-gradient(160deg, #002d50 0%, #001a30 60%, #1a0002 100%);
    padding: 48px 20px 36px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(210,22,24,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-logo {
    width: 120px;
    height: 120px;
    object-fit: contain;
    filter: drop-shadow(0 0 28px rgba(210,22,24,0.6)) drop-shadow(0 4px 16px rgba(0,0,0,0.5));
    animation: floatLogo 4s ease-in-out infinite;
  }
  @keyframes floatLogo {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .hero h2 {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--gold);
    margin-top: 12px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    letter-spacing: 0.04em;
  }
  .hero-tagline {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
    font-weight: 600;
  }
  /* Steam animation */
  .steam-wrap {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 18px;
    pointer-events: none;
  }
  .steam {
    width: 6px;
    height: 40px;
    background: linear-gradient(to top, rgba(255,255,255,0.18), transparent);
    border-radius: 50px;
    animation: steam 2.5s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .steam:nth-child(2) { animation-delay: 0.5s; height: 55px; }
  .steam:nth-child(3) { animation-delay: 1s; height: 45px; }
  @keyframes steam {
    0% { transform: scaleX(1) translateY(0); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: scaleX(2.5) translateY(-40px); opacity: 0; }
  }

  /* SECTION TABS */
  .tabs-wrapper {
    position: sticky;
    top: 88px;
    z-index: 90;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 10px;
    overflow-x: auto;
    scrollbar-width: none;
    display: flex;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 14px 18px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: rgba(255,255,255,0.6);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.25s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--primary);
  }
  .tab-btn:hover { color: var(--text); }

  /* CONTENT */
  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }
  .section-title {
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: "";
    flex: 1;
    height: 2px;
    background: linear-gradient(to left, transparent, var(--primary));
    border-radius: 2px;
  }
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  /* MENU CARD */
  .item-card {
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .item-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.4), 0 0 0 1px rgba(210,22,24,0.3);
  }
  .item-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
  }
  .item-img-placeholder {
    width: 100%;
    height: 160px;
    background: linear-gradient(135deg, #001f38, #003a68);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .item-body {
    padding: 14px;
  }
  .item-name {
    font-size: 1rem;
    font-weight: 800;
    margin-bottom: 4px;
    color: #fff;
  }
  .item-desc {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
    min-height: 36px;
  }
  .item-price {
    display: inline-block;
    margin-top: 10px;
    background: var(--primary);
    color: #fff;
    font-weight: 900;
    font-size: 0.92rem;
    padding: 5px 14px;
    border-radius: 30px;
    letter-spacing: 0.03em;
  }


  /* DELIVERY TIME */
  .delivery-section {
    margin-bottom: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .delivery-section label {
    display: block; font-size: 0.8rem;
    color: rgba(255,255,255,0.55); margin-bottom: 10px;
    font-weight: 700;
  }
  .delivery-btns {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .delivery-btn {
    padding: 7px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-family: 'Cairo', sans-serif;
    font-size: 0.8rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s;
  }
  .delivery-btn.active {
    background: var(--primary); border-color: var(--primary); color: #fff;
  }
  .delivery-custom {
    display: none; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .delivery-custom.show { display: flex; }
  .delivery-custom input {
    padding: 8px 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff;
    font-family: 'Cairo', sans-serif; font-size: 0.85rem;
    outline: none; width: 140px;
  }
  .delivery-custom input:focus { border-color: var(--primary); }
  .delivery-selected {
    font-size: 0.78rem; color: var(--gold);
    margin-top: 6px; font-weight: 700; min-height: 18px;
  }

  /* LOADING */
  .loading-wrap {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.5);
    font-size: 1rem;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  footer {
    background: rgba(0,0,0,0.4);
    border-top: 1px solid var(--border);
    padding: 24px 20px;
    text-align: center;
    color: rgba(255,255,255,0.45);
    font-size: 0.78rem;
    line-height: 1.8;
  }
  footer strong { color: var(--gold); }

  @media (max-width: 480px) {
    .hero h2 { font-size: 1.6rem; }
    .items-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .item-img, .item-img-placeholder { height: 120px; }
  }

  /* CART */
  .cart-fab {
    position: fixed; bottom: 24px; left: 24px; z-index: 500;
    background: var(--primary); color: #fff;
    border: none; border-radius: 50px;
    padding: 14px 22px; font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 900; cursor: pointer;
    box-shadow: 0 6px 24px rgba(210,22,24,0.5);
    display: none; align-items: center; gap: 10px;
    transition: transform 0.2s;
  }
  .cart-fab:hover { transform: scale(1.05); }
  .cart-count {
    background: var(--gold); color: #000;
    border-radius: 50%; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 900;
  }

  /* CART MODAL */
  .cart-overlay {
    position: fixed; inset: 0; z-index: 600;
    background: rgba(0,0,0,0.75);
    display: none; align-items: flex-end; justify-content: center;
  }
  .cart-overlay.open { display: flex; }
  .cart-sheet {
    background: #002d50;
    border-radius: 24px 24px 0 0;
    width: 100%; max-width: 600px;
    max-height: 85vh; overflow-y: auto;
    padding: 24px 20px 32px;
    border-top: 2px solid var(--primary);
  }
  .cart-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .cart-header h2 { font-size: 1.2rem; font-weight: 900; color: var(--gold); }
  .btn-close-cart {
    background: rgba(255,255,255,0.08); border: none;
    color: #fff; width: 36px; height: 36px; border-radius: 50%;
    font-size: 1.1rem; cursor: pointer;
  }
  .cart-items { margin-bottom: 20px; }
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .cart-item-name { flex: 1; font-size: 0.9rem; font-weight: 700; }
  .cart-item-price { color: var(--gold); font-weight: 800; font-size: 0.85rem; white-space: nowrap; }
  .qty-ctrl { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    width: 28px; height: 28px; border-radius: 8px;
    font-size: 1rem; cursor: pointer; font-weight: 900;
  }
  .qty-btn:hover { background: var(--primary); }
  .qty-num { font-weight: 800; min-width: 20px; text-align: center; }
  .cart-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-top: 2px solid rgba(255,255,255,0.1);
    margin-bottom: 16px;
  }
  .cart-total span { font-size: 1rem; font-weight: 900; }
  .cart-total strong { color: var(--gold); font-size: 1.2rem; }

  /* ORDER FORM */
  .order-form .field { margin-bottom: 12px; }
  .order-form label { display: block; font-size: 0.78rem; color: rgba(255,255,255,0.55); margin-bottom: 4px; }
  .order-form input, .order-form textarea {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #fff;
    font-family: 'Cairo', sans-serif; font-size: 0.9rem;
    outline: none; resize: none;
  }
  .order-form input:focus, .order-form textarea:focus { border-color: var(--primary); }
  .btn-order {
    width: 100%; padding: 14px;
    background: var(--primary); border: none; border-radius: 12px;
    color: #fff; font-family: 'Cairo', sans-serif;
    font-size: 1.05rem; font-weight: 900; cursor: pointer;
    transition: background 0.2s; margin-top: 8px;
  }
  .btn-order:hover { background: #b01214; }

  /* SUCCESS */
  .order-success {
    text-align: center; padding: 30px 10px;
  }
  .order-success .icon { font-size: 3.5rem; margin-bottom: 12px; }
  .order-success h3 { font-size: 1.3rem; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
  .order-success p { color: rgba(255,255,255,0.65); font-size: 0.88rem; line-height: 1.6; }

  /* Add to cart btn on cards */
  .btn-add-cart {
    display: flex; align-items: center; gap: 6px;
    background: rgba(210,22,24,0.15);
    border: 1px solid rgba(210,22,24,0.4);
    color: var(--primary); border-radius: 20px;
    padding: 5px 12px; font-family: 'Cairo', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s; margin-top: 10px;
  }
  .btn-add-cart:hover { background: var(--primary); color: #fff; }

</style>
</head>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مندي أبو الزوز</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #002d50;
    --primary: #d21618;
    --gold: #f5c842;
    --text: #ffffff;
    --card-bg: #003a68;
    --border: rgba(255,255,255,0.08);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(0,20,38,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--primary);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(210,22,24,0.5));
  }
  .header-text h1 {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1.2;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }
  .header-text p {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
  }
  .header-phone {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .header-phone a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .header-phone a::before { content: "📞"; font-size: 0.75rem; }

  /* HERO */
  .hero {
    position: relative;
    background: linear-gradient(160deg, #002d50 0%, #001a30 60%, #1a0002 100%);
    padding: 48px 20px 36px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(210,22,24,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-logo {
    width: 120px;
    height: 120px;
    object-fit: contain;
    filter: drop-shadow(0 0 28px rgba(210,22,24,0.6)) drop-shadow(0 4px 16px rgba(0,0,0,0.5));
    animation: floatLogo 4s ease-in-out infinite;
  }
  @keyframes floatLogo {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .hero h2 {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--gold);
    margin-top: 12px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    letter-spacing: 0.04em;
  }
  .hero-tagline {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
    font-weight: 600;
  }
  /* Steam animation */
  .steam-wrap {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 18px;
    pointer-events: none;
  }
  .steam {
    width: 6px;
    height: 40px;
    background: linear-gradient(to top, rgba(255,255,255,0.18), transparent);
    border-radius: 50px;
    animation: steam 2.5s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .steam:nth-child(2) { animation-delay: 0.5s; height: 55px; }
  .steam:nth-child(3) { animation-delay: 1s; height: 45px; }
  @keyframes steam {
    0% { transform: scaleX(1) translateY(0); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: scaleX(2.5) translateY(-40px); opacity: 0; }
  }

  /* SECTION TABS */
  .tabs-wrapper {
    position: sticky;
    top: 88px;
    z-index: 90;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 10px;
    overflow-x: auto;
    scrollbar-width: none;
    display: flex;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 14px 18px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: rgba(255,255,255,0.6);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.25s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--primary);
  }
  .tab-btn:hover { color: var(--text); }

  /* CONTENT */
  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }
  .section-title {
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: "";
    flex: 1;
    height: 2px;
    background: linear-gradient(to left, transparent, var(--primary));
    border-radius: 2px;
  }
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  /* MENU CARD */
  .item-card {
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .item-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.4), 0 0 0 1px rgba(210,22,24,0.3);
  }
  .item-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
  }
  .item-img-placeholder {
    width: 100%;
    height: 160px;
    background: linear-gradient(135deg, #001f38, #003a68);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .item-body {
    padding: 14px;
  }
  .item-name {
    font-size: 1rem;
    font-weight: 800;
    margin-bottom: 4px;
    color: #fff;
  }
  .item-desc {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
    min-height: 36px;
  }
  .item-price {
    display: inline-block;
    margin-top: 10px;
    background: var(--primary);
    color: #fff;
    font-weight: 900;
    font-size: 0.92rem;
    padding: 5px 14px;
    border-radius: 30px;
    letter-spacing: 0.03em;
  }


  /* DELIVERY TIME */
  .delivery-section {
    margin-bottom: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .delivery-section label {
    display: block; font-size: 0.8rem;
    color: rgba(255,255,255,0.55); margin-bottom: 10px;
    font-weight: 700;
  }
  .delivery-btns {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .delivery-btn {
    padding: 7px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-family: 'Cairo', sans-serif;
    font-size: 0.8rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s;
  }
  .delivery-btn.active {
    background: var(--primary); border-color: var(--primary); color: #fff;
  }
  .delivery-custom {
    display: none; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .delivery-custom.show { display: flex; }
  .delivery-custom input {
    padding: 8px 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff;
    font-family: 'Cairo', sans-serif; font-size: 0.85rem;
    outline: none; width: 140px;
  }
  .delivery-custom input:focus { border-color: var(--primary); }
  .delivery-selected {
    font-size: 0.78rem; color: var(--gold);
    margin-top: 6px; font-weight: 700; min-height: 18px;
  }

  /* LOADING */
  .loading-wrap {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.5);
    font-size: 1rem;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  footer {
    background: rgba(0,0,0,0.4);
    border-top: 1px solid var(--border);
    padding: 24px 20px;
    text-align: center;
    color: rgba(255,255,255,0.45);
    font-size: 0.78rem;
    line-height: 1.8;
  }
  footer strong { color: var(--gold); }

  @media (max-width: 480px) {
    .hero h2 { font-size: 1.6rem; }
    .items-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .item-img, .item-img-placeholder { height: 120px; }
  }

  /* CART */
  .cart-fab {
    position: fixed; bottom: 24px; left: 24px; z-index: 500;
    background: var(--primary); color: #fff;
    border: none; border-radius: 50px;
    padding: 14px 22px; font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 900; cursor: pointer;
    box-shadow: 0 6px 24px rgba(210,22,24,0.5);
    display: none; align-items: center; gap: 10px;
    transition: transform 0.2s;
  }
  .cart-fab:hover { transform: scale(1.05); }
  .cart-count {
    background: var(--gold); color: #000;
    border-radius: 50%; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 900;
  }

  /* CART MODAL */
  .cart-overlay {
    position: fixed; inset: 0; z-index: 600;
    background: rgba(0,0,0,0.75);
    display: none; align-items: flex-end; justify-content: center;
  }
  .cart-overlay.open { display: flex; }
  .cart-sheet {
    background: #002d50;
    border-radius: 24px 24px 0 0;
    width: 100%; max-width: 600px;
    max-height: 85vh; overflow-y: auto;
    padding: 24px 20px 32px;
    border-top: 2px solid var(--primary);
  }
  .cart-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .cart-header h2 { font-size: 1.2rem; font-weight: 900; color: var(--gold); }
  .btn-close-cart {
    background: rgba(255,255,255,0.08); border: none;
    color: #fff; width: 36px; height: 36px; border-radius: 50%;
    font-size: 1.1rem; cursor: pointer;
  }
  .cart-items { margin-bottom: 20px; }
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .cart-item-name { flex: 1; font-size: 0.9rem; font-weight: 700; }
  .cart-item-price { color: var(--gold); font-weight: 800; font-size: 0.85rem; white-space: nowrap; }
  .qty-ctrl { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    width: 28px; height: 28px; border-radius: 8px;
    font-size: 1rem; cursor: pointer; font-weight: 900;
  }
  .qty-btn:hover { background: var(--primary); }
  .qty-num { font-weight: 800; min-width: 20px; text-align: center; }
  .cart-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-top: 2px solid rgba(255,255,255,0.1);
    margin-bottom: 16px;
  }
  .cart-total span { font-size: 1rem; font-weight: 900; }
  .cart-total strong { color: var(--gold); font-size: 1.2rem; }

  /* ORDER FORM */
  .order-form .field { margin-bottom: 12px; }
  .order-form label { display: block; font-size: 0.78rem; color: rgba(255,255,255,0.55); margin-bottom: 4px; }
  .order-form input, .order-form textarea {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #fff;
    font-family: 'Cairo', sans-serif; font-size: 0.9rem;
    outline: none; resize: none;
  }
  .order-form input:focus, .order-form textarea:focus { border-color: var(--primary); }
  .btn-order {
    width: 100%; padding: 14px;
    background: var(--primary); border: none; border-radius: 12px;
    color: #fff; font-family: 'Cairo', sans-serif;
    font-size: 1.05rem; font-weight: 900; cursor: pointer;
    transition: background 0.2s; margin-top: 8px;
  }
  .btn-order:hover { background: #b01214; }

  /* SUCCESS */
  .order-success {
    text-align: center; padding: 30px 10px;
  }
  .order-success .icon { font-size: 3.5rem; margin-bottom: 12px; }
  .order-success h3 { font-size: 1.3rem; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
  .order-success p { color: rgba(255,255,255,0.65); font-size: 0.88rem; line-height: 1.6; }

  /* Add to cart btn on cards */
  .btn-add-cart {
    display: flex; align-items: center; gap: 6px;
    background: rgba(210,22,24,0.15);
    border: 1px solid rgba(210,22,24,0.4);
    color: var(--primary); border-radius: 20px;
    padding: 5px 12px; font-family: 'Cairo', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s; margin-top: 10px;
  }
  .btn-add-cart:hover { background: var(--primary); color: #fff; }

</style>
